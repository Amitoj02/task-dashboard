<svg viewBox="0 0 128 128" width="128" height="128" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Task Dashboard">
  <defs>
    <linearGradient id="a-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="a-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".20"/>
      <stop offset=".55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="a-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#34D399" stop-opacity=".75"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="128" height="128" rx="30" fill="url(#a-bg)"/>
  <rect x="0" y="0" width="128" height="128" rx="30" fill="url(#a-sheen)"/>

  <!-- row 1: running -->
  <circle cx="33" cy="44" r="13" fill="url(#a-glow)"/>
  <circle cx="33" cy="44" r="5.5" fill="#34D399"/>
  <rect x="45" y="40.5" width="28" height="7" rx="3.5" fill="#ffffff" fill-opacity=".95"/>

  <!-- row 2 -->
  <circle cx="33" cy="64" r="5.5" fill="#ffffff" fill-opacity=".9"/>
  <rect x="45" y="60.5" width="20" height="7" rx="3.5" fill="#ffffff" fill-opacity=".62"/>

  <!-- row 3 -->
  <circle cx="33" cy="84" r="5.5" fill="#ffffff" fill-opacity=".55"/>
  <rect x="45" y="80.5" width="24" height="7" rx="3.5" fill="#ffffff" fill-opacity=".48"/>

  <!-- play -->
  <path d="M80 44 L80 84 L112 64 Z" fill="#ffffff" stroke="#ffffff" stroke-width="5" stroke-linejoin="round"/>
</svg>
